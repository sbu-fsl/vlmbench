apiVersion: v1
kind: Pod
metadata:
  name: vlmbench
  namespace: llm-servings
  labels:
    app: vlmbench
spec:
  restartPolicy: Never
  containers:
    - name: vlmbench
      image: python:3.11-slim-bookworm
      imagePullPolicy: IfNotPresent
      workingDir: /workspace/vlmbench
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -euo pipefail

          if ! command -v git >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends git
            rm -rf /var/lib/apt/lists/*
          fi

          mkdir -p "${REPO_DIR}"
          if [ ! -d "${REPO_DIR}/.git" ]; then
            git clone "${REPO_URL}" "${REPO_DIR}"
          else
            git -C "${REPO_DIR}" pull --ff-only
          fi

          cd "${REPO_DIR}"
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt

          if [ -z "${COMMAND:-}" ]; then
            echo "Set COMMAND to the benchmark command you want this pod to run." >&2
            exec bash
          fi

          exec bash -lc "${COMMAND}"
      env:
        - name: REPO_URL
          value: https://github.com/sbu-fsl/vlmbench
        - name: REPO_DIR
          value: /workspace/vlmbench
        - name: KC
          value: "llama-1b-models.llm-servings.svc.cluster.local"
        - name: PORT
          value: "80"
        - name: REQUEST_TIMEOUT
          value: "0"
        - name: EXPORT_OUTPUT
          value: "/mnt/gpfs/llm-datasets/vlmbench.txt"
        - name: COMMAND
          value: "python main.py bench --clients 1 local_sharegpt --enable-prometheus-metrics --stop-after 200 --export-output ${EXPORT_OUTPUT} --endpoint ${KC}:${PORT}"
        - name: DEFAULT_DATA_DIR
          value: /mnt/gpfs/llm-datasets
        - name: HF_HOME
          value: /mnt/gpfs/llm-datasets
      volumeMounts:
        - name: llm-datasets
          mountPath: /mnt/gpfs/llm-datasets
  volumes:
    - name: llm-datasets
      hostPath:
        path: /mnt/gpfs/llm-datasets
        type: Directory
